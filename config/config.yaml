pipeline:
  timezone: "America/New_York"
  output_dir: "output"

calendars:
  ids:
    - "primary"
  exclude_patterns: []

transcripts:
  gemini_drive:
    enabled: true
  gemini:
    sender_patterns:
      - "calendar-notification@google.com"
      - "meetings-noreply@google.com"
    subject_patterns:
      - "Transcript"
      - "Meeting notes"
  gong:
    sender_patterns:
      - "notifications@gong.io"
      - "noreply@gong.io"
    subject_patterns:
      - "call"
      - "conversation"
  matching:
    time_window_minutes: 30
    include_unmatched_events: true
  preprocessing:
    strip_filler: true

synthesis:
  model: "claude-sonnet-4-20250514"
  extraction_max_output_tokens: 4096
  synthesis_max_output_tokens: 8192
  weekly_max_output_tokens: 8192
  monthly_max_output_tokens: 8192

slack:
  enabled: false
  channels: []
  dms: []
  thread_min_replies: 3
  thread_min_participants: 2
  max_messages_per_channel: 100
  bot_allowlist: []
  discovery_check_days: 7
  filter:
    skip_subtypes:
      - "channel_join"
      - "channel_leave"
      - "channel_topic"
      - "channel_purpose"
      - "channel_name"
    skip_patterns:
      - "^(ok|thanks|lol|yes|no|sure|yep|nope|haha|nice)$"

google_docs:
  enabled: false
  content_max_chars: 2500
  comment_max_chars: 500
  max_docs_per_day: 50
  exclude_ids: []
  exclude_title_patterns: []

hubspot:
  enabled: false
  # Ownership scope: "mine" (default), "all", or list of owner IDs/emails
  ownership_scope: "mine"
  # Volume caps per activity type (0 = unlimited)
  max_deals: 50
  max_contacts: 50
  max_tickets: 25
  max_activities_per_type: 25
  # HubSpot portal URL base for deep links (e.g., "https://app.hubspot.com/contacts/12345678")
  portal_url: ""
