pipeline:
  timezone: "America/New_York"
  output_dir: "output"

calendars:
  ids:
    - "primary"
  exclude_patterns: []

transcripts:
  gemini:
    sender_patterns:
      - "calendar-notification@google.com"
      - "meetings-noreply@google.com"
    subject_patterns:
      - "Transcript"
      - "Meeting notes"
  gong:
    sender_patterns:
      - "notifications@gong.io"
      - "noreply@gong.io"
    subject_patterns:
      - "call"
      - "conversation"
  matching:
    time_window_minutes: 30
    include_unmatched_events: true
  preprocessing:
    strip_filler: true

synthesis:
  model: "claude-sonnet-4-20250514"
  extraction_max_output_tokens: 4096
  synthesis_max_output_tokens: 8192
  weekly_max_output_tokens: 8192
  monthly_max_output_tokens: 8192
